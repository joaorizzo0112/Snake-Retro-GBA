<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Retro</title>
    <link rel="stylesheet" href="style.css">
    
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%238bac0f'/%3E%3Cpath d='M16 6a10 10 0 1 0 10 10V14h-4v2a6 6 0 1 1-6-6h2V6h-2z' fill='%230f380f'/%3E%3Crect x='20' y='6' width='4' height='4' fill='%23e74c3c'/%3E%3C/svg%3E"><body>

    <div class="device-bezel" id="gameConsole">
        
        <div class="gb-power-led"></div>
        <div class="gb-speaker"></div>

        <div class="screen-container" id="screenContainer">
            <div class="scanlines"></div>
            <canvas id="snakeGame" width="400" height="400"></canvas>
            
            <div class="retro-scoreboard">
                <div class="score-left">
                    <div>PTS:<span id="score">0</span></div>
                    <div id="soundIcon" class="sound-icon" title="Som [M]">
                        <svg viewBox="0 0 20 20" fill="currentColor" style="display: block; width: 100%; height: 100%;">
                            <rect x="1" y="7" width="4" height="6" />
                            <rect x="5" y="5" width="2" height="10" />
                            <rect x="7" y="3" width="2" height="14" />
                            <rect x="12" y="7" width="2" height="6" />
                            <rect x="16" y="4" width="2" height="12" />
                        </svg>
                    </div> 
                </div>
                <div class="score-center">MAX:<span id="highScore">0</span></div>
                <div class="score-right">LVL:<span id="levelText">WORM</span></div>
            </div>

            <div id="overlay" class="overlay">
                <h1 id="statusText">SNAKE</h1>
                <div id="modeSelector" class="mode-selector">
                    <span id="btnPrevMode" class="mode-arrow">◀</span>
                    <span id="currentModeText">CLÁSSICO</span>
                    <span id="btnNextMode" class="mode-arrow">▶</span>
                </div>
                <p id="instructionText" style="font-size: 0.6rem; margin: 10px 0; display: none;"></p>
                <div id="menuButtons" class="menu-buttons">
                    <button id="startBtn" class="menu-btn selected">> START <</button>
                    <button id="btnTutorial" class="menu-btn">TUTORIAL</button>
                </div>
                <a href="https://github.com/joaorizzo0112" target="_blank" class="github-link">
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    JOAORIZZO0112
                </a>
            </div>

            <div id="tutorialScreen" class="overlay" style="display: none; justify-content: center; padding: 15px; box-sizing: border-box;">
                <h2 style="font-size: 0.8rem; margin-bottom: 8px;">MANUAL</h2>
                <ul style="font-size: 0.55rem; line-height: 1.4; padding-left: 15px; margin-bottom: 12px; text-align: left; width: 80%;">
                    <li><b>WASD/D-PAD:</b> Mover</li>
                    <li><b>START/P:</b> Confirmar/Pausa</li>
                    <li><b>SELECT/C:</b> Mudar Cores</li>
                    <li><b>M:</b> Mutar Som</li>
                </ul>
                <h2 style="font-size: 0.8rem; margin-bottom: 8px;">MODOS</h2>
                <ul style="font-size: 0.55rem; line-height: 1.4; padding-left: 15px; margin-bottom: 15px; text-align: left; width: 80%;">
                    <li><b>PORTAL:</b> Sem paredes</li>
                    <li><b>BÓNUS:</b> Fruta extra</li>
                </ul>
                <button id="btnCloseTutorial" class="menu-btn selected" style="width: auto; padding: 10px 20px;">> FECHAR <</button>
            </div>
        </div>

        <div class="gb-dpad-wrapper">
            <div class="gb-dpad">
                <button class="gb-dpad-btn up" id="btnUp"></button>
                <button class="gb-dpad-btn left" id="btnLeft"></button>
                <div class="gb-dpad-center"><div class="gb-dpad-center-circle"></div></div>
                <button class="gb-dpad-btn right" id="btnRight"></button>
                <button class="gb-dpad-btn down" id="btnDown"></button>
            </div>
        </div>

        <div class="gb-action-wrapper">
            <div class="gb-action-buttons">
                <div class="gb-btn-group btn-b-group">
                    <button class="gb-round-btn btn-b" id="btnMute"></button>
                    <span class="gb-btn-label">M</span>
                </div>
                <div class="gb-btn-group">
                    <button class="gb-round-btn btn-a" id="btnPause"></button>
                    <span class="gb-btn-label">P</span>
                </div>
            </div>
        </div>

        <div class="gb-sys-wrapper">
            <div class="gb-sys-group">
                <button class="gb-pill-btn" id="btnSelectSys"></button>
                <span class="gb-sys-label">SELECT</span>
            </div>
            <div class="gb-sys-group">
                <button class="gb-pill-btn" id="btnStartSys"></button>
                <span class="gb-sys-label">START</span>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
